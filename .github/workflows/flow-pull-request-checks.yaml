# SPDX-License-Identifier: Apache-2.0

name: "PR Checks"
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

defaults:
  run:
    shell: bash

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: solo-linux-medium
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            non_docs:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    uses: ./.github/workflows/zxc-code-compiles.yaml
    with:
      custom-job-label: Standard

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/zxc-unit-test.yaml
    needs:
      - changes
      - build
    if: needs.changes.outputs.non_docs == 'true'
    with:
      custom-job-label: Standard

  uat-compat:
    name: UAT Backward Compatibility
    uses: ./.github/workflows/zxc-uat-test.yaml
    needs:
      - changes
      - build
    if: needs.changes.outputs.non_docs == 'true'
    with:
      custom-job-label: UAT Compat
      uat-scenario: compat
      vm-os: debian

  uat-core:
    name: UAT Core Lifecycle
    uses: ./.github/workflows/zxc-uat-test.yaml
    needs:
      - changes
      - build
      - uat-compat
    if: needs.changes.outputs.non_docs == 'true'
    with:
      custom-job-label: UAT Core
      uat-scenario: lifecycle
      vm-os: debian

  uat-purge-storage:
    name: UAT Purge Storage
    uses: ./.github/workflows/zxc-uat-test.yaml
    needs:
      - changes
      - build
      - uat-compat
    if: needs.changes.outputs.non_docs == 'true'
    with:
      custom-job-label: UAT Purge Storage
      uat-scenario: purge-storage
      vm-os: debian

  uat-plugin-preset-upgrade:
    name: UAT Plugin Preset Upgrade
    uses: ./.github/workflows/zxc-uat-test.yaml
    needs:
      - changes
      - build
      - uat-compat
    if: needs.changes.outputs.non_docs == 'true'
    with:
      custom-job-label: UAT Plugin Preset Upgrade
      uat-scenario: plugin-preset-upgrade
      vm-os: debian

  integration-tests:
    name: Integration Tests
    uses: ./.github/workflows/zxc-integration-test.yaml
    needs:
      - changes
      - build
      - uat-core
      - uat-purge-storage
      - uat-plugin-preset-upgrade
    if: needs.changes.outputs.non_docs == 'true'
    with:
      custom-job-label: Standard
      vm-os: debian
