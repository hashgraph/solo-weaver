# SPDX-License-Identifier: Apache-2.0

name: "ZXC: Code Compiles"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: ">=1.26.0"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Code Compiles"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  code-compiles:
    name: ${{ inputs.custom-job-label || 'Code Compiles' }}
    runs-on: solo-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so golangci-lint's `new-from-rev: origin/main` can
          # diff the PR head against the base commit. Used by `task lint:errorx`.
          fetch-depth: 0

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '>=1.26.0' }}

      - name: Compile Code
        run: task build

      - name: Code Style
        run: task lint:check
