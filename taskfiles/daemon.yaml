version: 3

tasks:
  build:daemon:all:
    desc: "Build the daemon binary for all configured operating systems and architectures"
    cmds:
      - task: build:daemon:all:os

  build:daemon:all:os:
    internal: true
    desc: "Build the daemon binary for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: build:daemon:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  build:daemon:all:arch:
    internal: true
    desc: "Build the daemon binary for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: build:daemon
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  build:daemon:
    desc: "Build the daemon binary for the specified operating system and architecture (dev mode)"
    env:
      GOOS: "{{coalesce .GOOS OS}}"
      GOARCH: "{{coalesce .GOARCH ARCH}}"
    cmds:
      - cmd: go build -ldflags='{{.LDFLAGS}}' -trimpath -o bin/solo-provisioner-daemon-{{coalesce .GOOS OS}}-{{coalesce .GOARCH ARCH}} ./cmd/daemon
      - cmd: chmod +x bin/solo-provisioner-daemon-{{coalesce .GOOS OS}}-{{coalesce .GOARCH ARCH}}

  hash:daemon:all:
    desc: "Hash the daemon binaries for all configured operating systems and architectures"
    deps:
      - "build:daemon:all"
    cmds:
      - task: hash:daemon:all:os

  hash:daemon:all:os:
    internal: true
    desc: "Hash the daemon binaries for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: hash:daemon:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  hash:daemon:all:arch:
    internal: true
    desc: "Hash the daemon binaries for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: hash:daemon
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  hash:daemon:
    internal: true
    desc: "Hash the daemon binary for the specified operating system and architecture"
    dir: bin
    cmds:
      - cmd: sha256sum solo-provisioner-daemon-{{.GOOS}}-{{.GOARCH}} > solo-provisioner-daemon-{{.GOOS}}-{{.GOARCH}}.sha256

  sign:daemon:all:
    desc: "Sign the daemon binaries for all configured operating systems and architectures"
    deps:
      - "build:daemon:all"
    cmds:
      - task: sign:daemon:all:os

  sign:daemon:all:os:
    internal: true
    desc: "Sign the daemon binaries for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: sign:daemon:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  sign:daemon:all:arch:
    internal: true
    desc: "Sign the daemon binaries for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: sign:daemon
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  sign:daemon:
    internal: true
    desc: "Sign the daemon binary for the specified operating system and architecture"
    env:
      GOOS: "{{coalesce .GOOS OS}}"
      GOARCH: "{{coalesce .GOARCH ARCH}}"
    cmds:
      - task: hash:daemon
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"
      - cmd: gpg --batch --yes --armor --output bin/solo-provisioner-daemon-{{.GOOS}}-{{.GOARCH}}.sha256.asc --detach-sign bin/solo-provisioner-daemon-{{.GOOS}}-{{.GOARCH}}.sha256
      - cmd: gpg --batch --yes --armor --output bin/solo-provisioner-daemon-{{.GOOS}}-{{.GOARCH}}.asc --detach-sign bin/solo-provisioner-daemon-{{.GOOS}}-{{.GOARCH}}
