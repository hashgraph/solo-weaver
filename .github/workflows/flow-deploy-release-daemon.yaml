# SPDX-License-Identifier: Apache-2.0

name: "Deploy Release Artifact (Daemon)"
on:
  workflow_dispatch:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: "1.26.0"
      dry-run-enabled:
        description: "Perform Dry Run"
        type: boolean
        required: false
        default: false

defaults:
  run:
    shell: bash

permissions:
  contents: write
  packages: read

jobs:
  create-github-release:
    name: Github / Release / Daemon
    runs-on: solo-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Retrieve Commit Hash
        id: commit
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "sha-abbrev=$(git rev-parse HEAD | tr -d '[:space:]' | cut -c1-8)" >> "${GITHUB_OUTPUT}"

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '1.26.0'}}

      - name: Install GnuPG Tools
        run: |
          if ! command -v gpg2 >/dev/null 2>&1; then
            echo "::group::Updating APT Repository Indices"
              sudo apt update
            echo "::endgroup::"
            echo "::group::Installing GnuPG Tools"
              sudo apt install -y gnupg2
            echo "::endgroup::"
          fi

      - name: Import GPG key
        id: gpg_key
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install Semantic Release & plugins
        run: |
          set -euo pipefail
          cat > package.json <<'JSON'
          {
            "name": "solo-weaver-release-tooling",
            "private": true,
            "devDependencies": {
              "semantic-release": "24.2.4",
              "@semantic-release/commit-analyzer": "13.0.1",
              "@semantic-release/release-notes-generator": "14.1.1",
              "@semantic-release/github": "11.0.6",
              "@semantic-release/exec": "7.1.0",
              "conventional-changelog-conventionalcommits": "8.0.0"
            }
          }
          JSON
          npm install --no-audit --no-fund

      - name: Publish Semantic Release (Daemon)
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          FLAGS=""
          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            FLAGS="--dry-run"
          fi

          npx semantic-release ${FLAGS} --extends "$(pwd)/.releaserc_daemon.json" 2>&1 | tee semantic-release-output.txt

          # Extract the next version from semantic-release output for dry-run
          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            NEXT_VERSION=$(sed -n 's/.*The next release version is \([0-9]\{1,\}\.[0-9]\{1,\}\.[0-9]\{1,\}\(-[0-9A-Za-z.-]\{1,\}\)\{0,1\}\).*/\1/p' semantic-release-output.txt || echo "")
            if [[ -n "$NEXT_VERSION" ]]; then
              echo "next-version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
              echo "::notice::Dry-run: Next daemon release would be daemon-v${NEXT_VERSION}"
            else
              echo "::notice::Dry-run: No new daemon release would be created"
            fi
          fi

      - name: Retrieve Release Version
        id: version
        run: |
          set -euo pipefail

          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            VERSION="${{ steps.semantic-release.outputs.next-version }}"
            if [[ -n "$VERSION" ]]; then
              echo "number=${VERSION}" >> "${GITHUB_OUTPUT}"
              echo "::notice::Dry-run mode - predicted daemon version: ${VERSION}"
            else
              echo "number=dry-run-no-release" >> "${GITHUB_OUTPUT}"
              echo "::notice::Dry-run mode - no daemon release would be created"
            fi
          else
            # Version is stamped into the binary via -ldflags at build time; there is
            # no longer a VERSION file to read. Recover the released version from the
            # semantic-release log (printed in both dry-run and real runs).
            VERSION=$(sed -n 's/.*The next release version is \([0-9]\{1,\}\.[0-9]\{1,\}\.[0-9]\{1,\}\(-[0-9A-Za-z.-]\{1,\}\)\{0,1\}\).*/\1/p' semantic-release-output.txt || echo "")
            if [[ -n "$VERSION" ]]; then
              echo "number=${VERSION}" >> "${GITHUB_OUTPUT}"
              echo "::notice::Released daemon version: ${VERSION}"
            else
              echo "number=no-release" >> "${GITHUB_OUTPUT}"
              echo "::notice::No new daemon release was created"
            fi
          fi
