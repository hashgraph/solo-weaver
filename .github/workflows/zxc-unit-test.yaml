# SPDX-License-Identifier: Apache-2.0

name: "ZXC: Unit Test"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: ">=1.26.5"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Unit Test"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  unit-test:
    name: "${{ inputs.custom-job-label || 'Unit Test' }}"
    runs-on: solo-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Detect KVM availability
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM_AVAILABLE=1" >> "$GITHUB_ENV"
            echo "KVM detected: /dev/kvm exists"
          else
            echo "KVM_AVAILABLE=0" >> "$GITHUB_ENV"
            echo "KVM not detected: /dev/kvm does not exist"
          fi

      - name: Debug QEMU accelerators (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 || true

          if command -v qemu-system-x86_64 >/dev/null 2>&1; then
            echo "=== qemu accelerators ==="
            qemu-system-x86_64 -accel help || true
          else
            echo "qemu-system-x86_64 not installed"
          fi


      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '>=1.26.5' }}

      - name: Run Unit Tests
        run: sudo -E --preserve-env=PATH,GOPATH,HOME,GOROOT,GITHUB_STEP_SUMMARY task test:unit:verbose

      - name: Unit Test Report
        if: ${{ always() }}
        run: |
          if [[ -f unit-test-report.md ]]; then
            sudo cat unit-test-report.md >> "${GITHUB_STEP_SUMMARY}"
          fi
