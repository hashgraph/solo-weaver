version: 3

tasks:
  uat:bootstrap:
    desc: "Bootstrap VM: self-install the solo-provisioner binary only"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Bootstrap: Self-install Binary"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        UNAME_ARCH=$(uname -m)
        case "$UNAME_ARCH" in
          x86_64)  ARCH=amd64 ;;
          aarch64) ARCH=arm64 ;;
          *) echo "FAIL: unsupported architecture '$UNAME_ARCH'."; exit 1 ;;
        esac
        cd /tmp && cp /mnt/solo-weaver/bin/solo-provisioner-linux-${ARCH} .
        sudo ./solo-provisioner-linux-${ARCH} install

        echo ''
        echo '✅ UAT Bootstrap: PASSED'

  uat:setup:
    desc: "Set up cluster for acceptance tests (inside VM: self-install + block node install)"
    interactive: true
    cmds:
      - task: uat:bootstrap
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Setup: Install Block Node"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"


        echo -e '\n▶ Block node install (v0.26.0)'
        sudo solo-provisioner block node install -p local \
          -c /mnt/solo-weaver/test/config/config_with_proxy.yaml


        echo -e '\n▶ Verify install (v0.26.0)'
        CHART_VER=$(helm list -n block-node -o json | sed -n 's/.*"chart":"[^"]*-\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p')
        echo "   Chart version: $CHART_VER"
        [ "$CHART_VER" = "0.26.0" ] || { echo "FAIL: expected chart version 0.26.0, got $CHART_VER"; exit 1; }
        kubectl get pods -n block-node
        echo '   Container images:'
        kubectl get pods -n block-node -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .spec.containers[*]}{.image}{" "}{end}{"\n"}{end}'

        echo ''
        echo '✅ UAT Setup: PASSED'

  uat:teardown:
    desc: "Tear down cluster after acceptance tests (inside VM: uninstall everything)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Teardown: Uninstall Everything"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"


        echo -e '\n▶ Block node uninstall'
        sudo solo-provisioner block node uninstall -p local \
          -c /mnt/solo-weaver/test/config/config_with_proxy.yaml -y || true


        echo -e '\n▶ Kube cluster uninstall'
        sudo solo-provisioner kube cluster uninstall || true


        echo -e '\n▶ Self-uninstall'
        sudo solo-provisioner uninstall || true

        echo ''
        echo '✅ UAT Teardown: DONE'

  uat:core:
    desc: "Run core block node upgrade + reset tests (inside VM: requires uat:setup first)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: Core Block Node (upgrade + reset)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Check cluster exists
        kubectl get nodes > /dev/null 2>&1 || { echo "FAIL: Kubernetes cluster not found. Run 'task uat:setup' first."; exit 1; }


        echo -e '\n▶ Upgrade to v0.29.0'
        sudo solo-provisioner block node upgrade -p local \
          --chart-version 0.29.0 \
          -c /mnt/solo-weaver/test/config/config_with_proxy.yaml


        echo -e '\n▶ Verify upgrade to v0.29.0 using --chart-version flag'
        CHART_VER=$(helm list -n block-node -o json | sed -n 's/.*"chart":"[^"]*-\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p')
        echo "   Chart version: $CHART_VER"
        [ "$CHART_VER" = "0.29.0" ] || { echo "FAIL: expected chart version 0.29.0, got $CHART_VER"; exit 1; }
        echo '   Container images:'
        kubectl get pods -n block-node -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .spec.containers[*]}{.image}{" "}{end}{"\n"}{end}'

        echo -e '\n▶ Verify MetalLB annotation present after upgrade to v0.29.0'
        ANNOTATION=$(kubectl get svc block-node-block-node-server -n block-node -o jsonpath='{.metadata.annotations.metallb\.io/address-pool}')
        [ "$ANNOTATION" = "public-address-pool" ] || { echo "FAIL: metallb annotation missing after v0.29.0 upgrade, got: '$ANNOTATION'"; exit 1; }
        echo "   metallb.io/address-pool: $ANNOTATION ✓"


        echo -e '\n▶ Upgrade to v0.30.2 using --chart-version flag'
        sudo solo-provisioner block node upgrade -p local \
          --chart-version 0.30.2 \
          -c /mnt/solo-weaver/test/config/config_with_proxy.yaml


        echo -e '\n▶ Verify upgrade to v0.30.2 using --chart-version flag'
        CHART_VER=$(helm list -n block-node -o json | sed -n 's/.*"chart":"[^"]*-\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p')
        echo "   Chart version: $CHART_VER"
        [ "$CHART_VER" = "0.30.2" ] || { echo "FAIL: expected chart version 0.30.2, got $CHART_VER"; exit 1; }
        echo '   Container images:'
        kubectl get pods -n block-node -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .spec.containers[*]}{.image}{" "}{end}{"\n"}{end}'

        echo -e '\n▶ Verify MetalLB annotation present after upgrade to v0.30.2'
        ANNOTATION=$(kubectl get svc block-node-block-node-server -n block-node -o jsonpath='{.metadata.annotations.metallb\.io/address-pool}')
        [ "$ANNOTATION" = "public-address-pool" ] || { echo "FAIL: metallb annotation missing after v0.30.2 upgrade, got: '$ANNOTATION'"; exit 1; }
        echo "   metallb.io/address-pool: $ANNOTATION ✓"


        echo -e '\n▶ Upgrade to latest (v0.35.1) using updated chartVersion in config'
        sudo solo-provisioner block node upgrade -p local \
          -c /mnt/solo-weaver/test/config/config_with_proxy_latest.yaml


        echo -e '\n▶ Verify upgrade to latest (v0.35.1)'
        CHART_VER=$(helm list -n block-node -o json | sed -n 's/.*"chart":"[^"]*-\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p')
        echo "   Chart version: $CHART_VER"
        [ "$CHART_VER" = "0.35.1" ] || { echo "FAIL: expected chart version 0.35.1, got $CHART_VER"; exit 1; }
        echo '   Container images:'
        kubectl get pods -n block-node -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .spec.containers[*]}{.image}{" "}{end}{"\n"}{end}'

        echo -e '\n▶ Verify MetalLB annotation present after upgrade to v0.35.1'
        ANNOTATION=$(kubectl get svc block-node-block-node-server -n block-node -o jsonpath='{.metadata.annotations.metallb\.io/address-pool}')
        [ "$ANNOTATION" = "public-address-pool" ] || { echo "FAIL: metallb annotation missing after v0.35.1 upgrade, got: '$ANNOTATION'"; exit 1; }
        echo "   metallb.io/address-pool: $ANNOTATION ✓"


        echo -e '\n▶ Block node reset'
        sudo solo-provisioner block node reset -p local \
          -c /mnt/solo-weaver/test/config/config_with_proxy.yaml

        echo ''
        echo '✅ Core Block Node: PASSED'

  uat:purge-storage:
    desc: "Verify the three block-node uninstall variants (self-contained: bootstraps its own cluster)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: Block Node Uninstall Variants"
        echo "  matrix: (no flag) → with-reset → purge-storage"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"


        echo -e '\n▶ Bootstrap binary'
        task uat:bootstrap


        echo -e '\n▶ Install block node (also sets up cluster)'
        sudo solo-provisioner block node install -p local \
          -c /mnt/solo-weaver/test/config/config_with_proxy.yaml

        CONFIG=/mnt/solo-weaver/test/config/config_with_proxy.yaml
        NS=block-node
        # Must match the basePath in config_with_proxy.yaml (/mnt/fast-storage).
        # The old /opt/weaver/block-node-storage path was the wrong location.
        LIVE_DIR=/mnt/fast-storage/live
        # Match the dual selector used by DeleteAllPersistentVolumes: solo-provisioner-managed OR Helm-managed for this release.
        BN_LABEL_SELECTOR='app.kubernetes.io/component=block-node-storage,app.kubernetes.io/managed-by in (solo-provisioner,Helm)'

        count_release_pvcs() { kubectl get pvc -n "$NS" -l "$BN_LABEL_SELECTOR" --no-headers 2>/dev/null | wc -l | tr -d ' '; }
        # PVs are cluster-scoped: filter by label selector then count only those whose
        # claimRef.namespace matches $NS, so two releases in different namespaces don't
        # cross-count. Uses jsonpath to avoid a jq dependency in the VM.
        count_release_pvs()  {
          kubectl get pv -l "$BN_LABEL_SELECTOR" \
            -o jsonpath='{range .items[*]}{.spec.claimRef.namespace}{"\n"}{end}' 2>/dev/null \
            | grep -c "^${NS}$" || echo 0
        }
        live_dir_has_files()  { sudo bash -c "ls -A '$LIVE_DIR' 2>/dev/null | head -1" | grep -q .; }


        echo -e '\n▶ Sanity check: block-node is installed with labeled PV/PVCs and data'
        kubectl get pvc -n "$NS" -l "$BN_LABEL_SELECTOR"
        kubectl get pv -l "$BN_LABEL_SELECTOR"
        BASELINE_PVCS=$(count_release_pvcs)
        BASELINE_PVS=$(count_release_pvs)
        [ "$BASELINE_PVCS" -gt 0 ] || { echo "FAIL: no block-node PVCs matched selector — has the install bootstrapped the new labels?"; exit 1; }
        [ "$BASELINE_PVS" -gt 0 ]  || { echo "FAIL: no block-node PVs matched selector and namespace"; exit 1; }
        echo "   PVCs (labeled, in $NS): $BASELINE_PVCS   PVs (labeled, claimRef in $NS): $BASELINE_PVS"

        # Seed a sentinel file so live_dir_has_files is reliable on a fresh install.
        # A newly-installed block node may not yet have written any block files;
        # we only care that uninstall (no flag) preserves existing data, not that
        # the node has produced blocks.
        sudo bash -c "mkdir -p '$LIVE_DIR' && echo 'sentinel' > '$LIVE_DIR/sentinel.blk'"
        live_dir_has_files || { echo "FAIL: could not seed sentinel file in $LIVE_DIR"; exit 1; }
        echo "   Sentinel file seeded in $LIVE_DIR"


        echo -e '\n▶ Variant 1/3: uninstall (no flag) — helm release should go; PV/PVC + data should stay'
        sudo solo-provisioner block node uninstall -p local -c "$CONFIG" -y

        helm list -n "$NS" -q | grep -q . && { echo "FAIL: helm release still present"; exit 1; }
        PVCS=$(count_release_pvcs); PVS=$(count_release_pvs)
        [ "$PVCS" -eq "$BASELINE_PVCS" ] || { echo "FAIL: expected $BASELINE_PVCS PVCs to be retained, found $PVCS"; exit 1; }
        [ "$PVS"  -eq "$BASELINE_PVS"  ] || { echo "FAIL: expected $BASELINE_PVS PVs to be retained, found $PVS"; exit 1; }
        live_dir_has_files || { echo "FAIL: live data dir was wiped, expected it to be preserved"; exit 1; }
        echo "   ✓ helm gone; PVCs=$PVCS PVs=$PVS; data preserved"


        echo -e '\n▶ Re-installing for variant 2'
        sudo solo-provisioner block node install -p local -c "$CONFIG"


        echo -e '\n▶ Variant 2/3: uninstall --with-reset — helm + data should go; PV/PVC should stay'
        sudo solo-provisioner block node uninstall -p local -c "$CONFIG" --with-reset -y

        helm list -n "$NS" -q | grep -q . && { echo "FAIL: helm release still present"; exit 1; }
        PVCS=$(count_release_pvcs); PVS=$(count_release_pvs)
        [ "$PVCS" -eq "$BASELINE_PVCS" ] || { echo "FAIL: expected $BASELINE_PVCS PVCs to be retained under --with-reset, found $PVCS"; exit 1; }
        [ "$PVS"  -eq "$BASELINE_PVS"  ] || { echo "FAIL: expected $BASELINE_PVS PVs to be retained under --with-reset, found $PVS"; exit 1; }
        live_dir_has_files && { echo "FAIL: live data dir not wiped under --with-reset"; exit 1; }
        echo "   ✓ helm gone; PVCs=$PVCS PVs=$PVS; data wiped"


        echo -e '\n▶ Re-installing for variant 3'
        sudo solo-provisioner block node install -p local -c "$CONFIG"


        echo -e '\n▶ Variant 3/3: uninstall --purge-storage — everything (helm + data + PV/PVC) should go'
        sudo solo-provisioner block node uninstall -p local -c "$CONFIG" --purge-storage -y

        helm list -n "$NS" -q | grep -q . && { echo "FAIL: helm release still present"; exit 1; }
        PVCS=$(count_release_pvcs); PVS=$(count_release_pvs)
        [ "$PVCS" -eq 0 ] || { echo "FAIL: expected 0 PVCs under --purge-storage, found $PVCS"; exit 1; }
        [ "$PVS"  -eq 0 ] || { echo "FAIL: expected 0 PVs under --purge-storage, found $PVS"; exit 1; }
        live_dir_has_files && { echo "FAIL: live data dir not wiped under --purge-storage"; exit 1; }
        echo "   ✓ helm gone; PVCs=0 PVs=0; data wiped"


        echo -e '\n▶ Teardown'
        sudo solo-provisioner kube cluster uninstall || true
        sudo solo-provisioner uninstall || true

        echo ''
        echo '✅ Block Node Uninstall Variants: PASSED'

  uat:teleport:
    desc: "Run teleport lifecycle test (inside VM: requires cluster from uat:setup)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: Teleport Lifecycle"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Check cluster exists
        kubectl get nodes > /dev/null 2>&1 || { echo "FAIL: Kubernetes cluster not found. Run 'task uat:setup' first."; exit 1; }


        # Docker + docker compose required for Teleport server container
        command -v docker >/dev/null 2>&1 || { echo "FAIL: Docker not found. Install docker.io first."; exit 1; }
        docker compose version >/dev/null 2>&1 || { echo "FAIL: Docker Compose v2 plugin not found. Install docker-compose-plugin first."; exit 1; }

        echo -e '\n▶ Step 1: Start Teleport server (Docker)'
        task teleport:start


        echo -e '\n▶ Step 2: Teleport cluster agent install'
        sudo solo-provisioner teleport cluster install \
          --values=/tmp/teleport-values-configured.yaml


        echo -e '\n▶ Step 3: Verify cluster agent pods'
        kubectl get pods -n teleport-agent

        echo -e '\n▶ Step 4: Teleport cluster agent uninstall'
        sudo solo-provisioner teleport cluster uninstall

        echo -e '\n▶ Step 5: Verify cluster agent removed'
        RELEASE_COUNT=$(helm list -n teleport-agent -o json | grep -c '"name"' || true)
        [ "$RELEASE_COUNT" = "0" ] || { echo "FAIL: teleport-agent Helm release still present"; exit 1; }


        echo -e '\n▶ Step 6: Generate node agent token'
        AGENT_OUTPUT=$(task teleport:node-agent-token 2>&1 || true)
        TOKEN=$(echo "$AGENT_OUTPUT" | sed -n 's/.*Token: \([0-9a-f]*\)$/\1/p' | head -1)
        PROXY=$(echo "$AGENT_OUTPUT" | sed -n 's/.*Proxy: \([0-9.]*:[0-9]*\)$/\1/p' | head -1)
        if [ -z "$TOKEN" ] || [ -z "$PROXY" ]; then
          echo '⏭ Skipping node agent test: could not extract token/proxy'
        else
  
          echo -e '\n▶ Step 7: Teleport node agent install'
          sudo solo-provisioner teleport node install \
            --token="$TOKEN" \
            --proxy="$PROXY"

  
          echo -e '\n▶ Step 8: Verify node agent running'
          sudo systemctl is-active teleport || { echo "FAIL: teleport service not active"; exit 1; }

          echo -e '\n▶ Step 9: Teleport node agent uninstall'
          sudo solo-provisioner teleport node uninstall

          echo -e '\n▶ Step 10: Verify node agent removed'
          sudo systemctl is-active teleport 2>/dev/null && { echo "FAIL: teleport service still active"; exit 1; } || true
        fi


        echo -e '\n▶ Cleanup: Stop Teleport server'
        task teleport:stop

        echo ''
        echo '✅ Teleport Lifecycle: PASSED'

  uat:alloy:
    desc: "Run alloy lifecycle test (inside VM: requires cluster from uat:setup)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: Alloy Lifecycle"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Check cluster exists
        kubectl get nodes > /dev/null 2>&1 || { echo "FAIL: Kubernetes cluster not found. Run 'task uat:setup' first."; exit 1; }


        # Docker + docker compose required for observability stack containers
        command -v docker >/dev/null 2>&1 || { echo "FAIL: Docker not found. Install docker.io + docker-compose-plugin first."; exit 1; }
        docker compose version >/dev/null 2>&1 || { echo "FAIL: Docker Compose plugin not found. Install docker-compose-plugin first."; exit 1; }

        echo -e '\n▶ Step 1: Start observability stack (Prometheus, Loki, Grafana)'
        task alloy:start


        echo -e '\n▶ Step 2: Create K8s secret for remote endpoints'
        task alloy:create-secret


        echo -e '\n▶ Step 3: Get node IP for remote URLs'
        NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
        echo "   Node IP: $NODE_IP"


        echo -e '\n▶ Step 4: Alloy install with remotes and block node monitoring'
        sudo solo-provisioner alloy cluster install \
          --add-prometheus-remote=name=local,url=http://$NODE_IP:9090/api/v1/write,username=admin \
          --add-loki-remote=name=local,url=http://$NODE_IP:3100/loki/api/v1/push,username=admin \
          --cluster-name=uat-test \
          --monitor-block-node


        echo -e '\n▶ Step 5: Verify Alloy pods running'
        kubectl get pods -n grafana-alloy
        POD_COUNT=$(kubectl get pods -n grafana-alloy --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
        [ "$POD_COUNT" -gt 0 ] || { echo "FAIL: no running pods in grafana-alloy namespace"; exit 1; }


        echo -e '\n▶ Step 6: Alloy uninstall'
        sudo solo-provisioner alloy cluster uninstall


        echo -e '\n▶ Step 7: Verify Alloy removed'
        RELEASE_COUNT=$(helm list -n grafana-alloy -o json | grep -c '"name"' || true)
        [ "$RELEASE_COUNT" = "0" ] || { echo "FAIL: grafana-alloy Helm releases still present"; exit 1; }


        echo -e '\n▶ Cleanup: Stop observability stack'
        task alloy:stop

        echo ''
        echo '✅ Alloy Lifecycle: PASSED'

  uat:compat:
    desc: "Run backward compatibility test (inside VM: install old CLI → upgrade → verify migrations)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: Backward Compatibility"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"


        echo -e '\n▶ Step 1: Install released version of solo-provisioner'
        cd /tmp
        curl -sSL https://raw.githubusercontent.com/hashgraph/solo-weaver/main/install.sh | bash


        echo -e '\n▶ Step 2: Record released version'
        OLD_VER=$(sudo solo-provisioner --version -o json 2>&1 | tr ',' '\n' | sed -n 's/.*"version":"\([^"]*\)".*/\1/p' | head -1)
        [ -z "$OLD_VER" ] && OLD_VER="unknown"
        echo "   Released version: $OLD_VER"


        echo -e '\n▶ Step 3: Create provisioner system accounts'
        sudo groupadd -g 2500 weaver 2>/dev/null || true
        sudo useradd -r -u 2500 -g 2500 -m -d /home/weaver -s /usr/sbin/nologin weaver 2>/dev/null || true


        echo -e '\n▶ Step 4: Deploy block node with released version'
        sudo solo-provisioner block node install -p local \
          -c /mnt/solo-weaver/test/config/config.yaml


        echo -e '\n▶ Step 5: Verify deployment'
        kubectl get pods -n block-node


        echo -e '\n▶ Step 6: Record state file before upgrade'
        STATE_VER_BEFORE=$(sudo grep 'version:' /opt/solo/weaver/state/state.yaml | head -1 || echo "none")
        echo "   State version before: $STATE_VER_BEFORE"


        echo -e '\n▶ Step 7: Upgrade CLI to new binary (from current branch)'
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        cd /tmp && cp /mnt/solo-weaver/bin/solo-provisioner-linux-${ARCH} .
        sudo ./solo-provisioner-linux-${ARCH} install


        echo -e '\n▶ Step 8: Verify new CLI version'
        NEW_VER=$(sudo solo-provisioner --version -o json 2>&1 | tr ',' '\n' | sed -n 's/.*"version":"\([^"]*\)".*/\1/p' | head -1)
        [ -z "$NEW_VER" ] && NEW_VER="0.0.0"
        echo "   New version: $NEW_VER"


        echo -e '\n▶ Step 9: Upgrade block node (triggers startup migrations if needed)'
        sudo solo-provisioner block node upgrade -p local \
          -c /mnt/solo-weaver/test/config/config_with_proxy_latest.yaml


        echo -e '\n▶ Step 10: Verify state file after upgrade'
        [ -f /opt/solo/weaver/state/state.yaml ] || { echo "FAIL: state file missing after upgrade"; exit 1; }
        STATE_VER_AFTER=$(sudo grep 'version:' /opt/solo/weaver/state/state.yaml | head -1 || echo "none")
        echo "   State version after: $STATE_VER_AFTER"


        echo -e '\n▶ Step 11: Verify block node is running'
        kubectl get pods -n block-node
        CHART_VER=$(helm list -n block-node -o json | sed -n 's/.*"chart":"[^"]*-\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p')
        echo "   Chart version: $CHART_VER"


        echo -e '\n▶ Step 12: Check migration logs'
        grep -i 'migration' /opt/solo/weaver/logs/solo-provisioner.log 2>/dev/null | tail -5 || echo "   No migration log entries found"

        echo ''
        echo '✅ Backward Compatibility: PASSED'

  uat:solo-operator:
    desc: "Run solo-operator lifecycle test (inside VM: requires cluster from uat:setup with soloOperator.enabled)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: solo-operator Lifecycle"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Ensure solo-provisioner binary is installed; Step 1 handles cluster setup
        command -v solo-provisioner > /dev/null 2>&1 || task uat:bootstrap

        echo -e '\n▶ Step 1: Install cluster with soloOperator.enabled=true'
        sudo solo-provisioner kube cluster install -p local --node-type=block\
          -c /mnt/solo-weaver/test/config/config_with_solo_operator.yaml


        echo -e '\n▶ Step 2: Verify solo-operator Helm release is deployed'
        RELEASE_STATUS=$(helm list -n solo-operator -o json | sed -n 's/.*"status":"\([^"]*\)".*/\1/p' | head -1)
        echo "   Release status: $RELEASE_STATUS"
        [ "$RELEASE_STATUS" = "deployed" ] || { echo "FAIL: expected status=deployed, got '$RELEASE_STATUS'"; exit 1; }


        echo -e '\n▶ Step 3: Verify controller-manager pod is running'
        kubectl wait --for=condition=Ready pod \
          -l app.kubernetes.io/name=solo-operator \
          -n solo-operator \
          --timeout=120s
        kubectl get pods -n solo-operator


        echo -e '\n▶ Step 4: Verify CRDs are installed'
        for CRD in \
          consensuscapsules.operator.solo.hedera.com \
          envoyproxies.operator.solo.hedera.com \
          haproxycapsules.operator.solo.hedera.com \
          helmcapsules.operator.solo.hedera.com \
          networkoperations.operator.solo.hedera.com \
          orbits.operator.solo.hedera.com; do
          kubectl get crd "$CRD" > /dev/null 2>&1 || { echo "FAIL: CRD $CRD not found"; exit 1; }
          echo "   $CRD ✓"
        done


        echo -e '\n▶ Step 5: Re-run install to verify idempotency'
        sudo solo-provisioner kube cluster install -p local --node-type=block \
          -c /mnt/solo-weaver/test/config/config_with_solo_operator.yaml
        echo "   Idempotent re-run completed successfully"


        echo -e '\n▶ Step 6: Verify cluster health check includes solo-operator'
        kubectl get ns solo-operator > /dev/null 2>&1 || { echo "FAIL: solo-operator namespace missing"; exit 1; }
        echo "   solo-operator namespace present ✓"

        echo ''
        echo '✅ solo-operator Lifecycle: PASSED'

  uat:plugin-preset-upgrade:
    desc: "Verify plugin preset names auto-update on upgrade across the 0.35 version boundary (self-contained: bootstraps its own cluster)"
    interactive: true
    cmds:
      - |
        set -e
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  UAT Test: Plugin Preset Upgrade (pre-0.35 → 0.35+)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Chart versions under test. Update if the last stable pre-0.35 or
        # current 0.35+ release changes.
        PRE_35_VERSION=0.33.0
        POST_35_VERSION=0.35.0
        CONFIG=/mnt/solo-weaver/test/config/config_with_proxy.yaml
        NS=block-node

        get_plugins() {
          helm get values block-node -n "$NS" 2>/dev/null | grep 'names:' | sed 's/.*names:[[:space:]]*//' | tr -d '"'
        }


        echo -e '\n▶ Step 1: Bootstrap binary'
        task uat:bootstrap


        echo -e "\n▶ Step 2: Install BN ${PRE_35_VERSION} with tier1-rfh preset (also sets up cluster)"
        sudo solo-provisioner block node install -p local \
          --chart-version "$PRE_35_VERSION" \
          --plugin-preset tier1-rfh \
          --non-interactive \
          -c "$CONFIG"


        echo -e '\n▶ Step 3: Verify pre-0.35 Helm values contain s3-archive'
        PLUGINS=$(get_plugins)
        echo "   plugins.names: $PLUGINS"
        echo "$PLUGINS" | grep -q 's3-archive' \
          || { echo "FAIL: expected s3-archive in plugins.names, got: $PLUGINS"; exit 1; }
        echo "$PLUGINS" | grep -qv 'cloud-storage-archive' \
          || { echo "FAIL: cloud-storage-archive should not be present pre-0.35, got: $PLUGINS"; exit 1; }
        echo "   ✓ s3-archive present, cloud-storage-* absent"


        echo -e "\n▶ Step 4: Upgrade to BN ${POST_35_VERSION} WITHOUT passing --plugin-preset"
        echo "   (tests non-interactive re-resolution from stored state)"
        # Run with || true: BN 0.35.0 may exceed the 5-minute Helm default timeout on CI
        # VMs (3 CPUs / 4 GB). The effective plugin list is logged before the Helm
        # operation starts, so we can verify the fix regardless of whether the pod
        # becomes ready in time.
        UPGRADE_LOG=/tmp/plugin-preset-upgrade.log
        sudo solo-provisioner block node upgrade -p local \
          --chart-version "$POST_35_VERSION" \
          --non-interactive \
          -c "$CONFIG" 2>&1 | tee "$UPGRADE_LOG" || true


        echo -e '\n▶ Step 5: Verify effective inputs contain cloud-storage-* and NOT s3-archive'
        # The provisioner logs "Determined effective user inputs" with the resolved
        # PluginList before the Helm upgrade runs — this is what we verify.
        grep -q 'cloud-storage-archive' "$UPGRADE_LOG" \
          || { echo "FAIL: cloud-storage-archive not found in effective upgrade inputs"; exit 1; }
        grep -q 'cloud-storage-expanded' "$UPGRADE_LOG" \
          || { echo "FAIL: cloud-storage-expanded not found in effective upgrade inputs"; exit 1; }
        echo "   ✓ effective inputs contain cloud-storage-archive and cloud-storage-expanded"


        echo -e '\n▶ Teardown'
        sudo solo-provisioner block node uninstall -p local -c "$CONFIG" -y || true
        sudo solo-provisioner kube cluster uninstall || true
        sudo solo-provisioner uninstall || true

        echo ''
        echo "NOTE: This test verifies plugin names in Helm values only."
        echo "      Data compatibility between s3-archive and cloud-storage-*"
        echo "      requires separate BN team sign-off before upgrading live nodes."
        echo ''
        echo '✅ Plugin Preset Upgrade: PASSED'

  uat:lifecycle:
    desc: "Run core lifecycle test (inside VM: setup → core upgrades → teardown)"
    interactive: true
    cmds:
      - task: uat:setup
