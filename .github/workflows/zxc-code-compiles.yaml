# SPDX-License-Identifier: Apache-2.0

name: "ZXC: Code Compiles"
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go Version:"
        type: string
        required: false
        default: ">=1.26.0"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Code Compiles"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  code-compiles:
    name: ${{ inputs.custom-job-label || 'Code Compiles' }}
    runs-on: solo-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so golangci-lint's `new-from-rev: origin/main` can
          # diff the PR head against the base commit. Used by `task lint:errorx`.
          fetch-depth: 0

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GoLang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version || '>=1.26.0' }}

      - name: Compile Code
        run: task build

      - name: Code Style
        run: task lint:check
