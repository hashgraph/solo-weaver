version: 3
silent: false
output: prefixed
vars:
  OS: [ linux ]
  ARCH: [ amd64, arm64 ]
  GO_VERSION: 1.26.0
  # Build metadata stamped into github.com/automa-saga/version at link time via -X.
  # Override VERSION on the command line or in CI (e.g. `task build:cli VERSION=0.20.0`);
  # COMMIT and DATE are derived automatically. Unstamped builds report "dev"/"none".
  VERSION: '{{.VERSION | default "dev"}}'
  COMMIT:
    sh: 'git rev-parse HEAD 2>/dev/null || echo none'
  DATE:
    sh: 'date -u +%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: '-w -s -X github.com/automa-saga/version.Version={{.VERSION}} -X github.com/automa-saga/version.Commit={{.COMMIT}} -X github.com/automa-saga/version.Date={{.DATE}}'
  # VM configuration
  VM_OS_TYPE: '{{.VM_OS_TYPE | default "debian"}}'  # Options: debian, ubuntu
  VM_NAME: "solo-weaver-{{.VM_OS_TYPE}}"
  VM_GOLDEN_NAME: "solo-weaver-{{.VM_OS_TYPE}}-golden"
  # Set this to the actual URL or local path of your golden image (e.g., "https://storage.example.com/golden-image.utm" or "/path/to/golden-image.utm")
  # For Debian: Set your Debian golden image URL
  # For Ubuntu: Set your Ubuntu 22.04 golden image URL
  VM_GOLDEN_IMAGE_URL_DEBIAN: '{{.VM_GOLDEN_IMAGE_URL_DEBIAN | default "https://storage.googleapis.com/solo-weaver/solo-weaver-debian-golden.utm.tar.gz" }}'
  VM_GOLDEN_IMAGE_URL_UBUNTU: '{{.VM_GOLDEN_IMAGE_URL_UBUNTU | default "https://storage.googleapis.com/solo-weaver/solo-weaver-ubuntu-golden.utm.tar.gz" }}'
  VM_USER: "provisioner"
  SSH_PRIVATE_KEY: "{{.PWD}}/.ssh/id_rsa_vm"
  SSH_PUBLIC_KEY: "{{.SSH_PRIVATE_KEY}}.pub"
  # Common SSH options for all VM connections. IdentityAgent=none prevents
  # external SSH agents (e.g. 1Password) from intercepting key auth.
  # ProxyCommand routes through nc with --apple-no-connectx to avoid macOS
  # connectx(2) failures on bridged UTM networks behind captive WiFi or VPNs.
  #SSH_OPTS: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentityAgent=none -o ProxyCommand="nc --apple-no-connectx %h %p"'
  SSH_OPTS: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentityAgent=none'
  UTM_VMS_DIR: "{{.HOME}}/Library/Containers/com.utmapp.UTM/Data/Documents"
  GET_VM_IP: |
    get_vm_ip() {
    utmctl ip-address "{{.VM_NAME}}" 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1
    }


includes:
  tests:
    taskfile: ./taskfiles/tests.yaml
    flatten: true
  uat:
    taskfile: ./taskfiles/uat.yaml
    flatten: true
  proxy:
    taskfile: ./taskfiles/proxy.yaml
    flatten: true
  alloy:
    taskfile: ./taskfiles/alloy.yaml
    flatten: true
  teleport:
    taskfile: ./taskfiles/teleport.yaml
    flatten: true
  vm:
    taskfile: ./taskfiles/vm.yaml
    flatten: true
  cli:
    taskfile: ./taskfiles/cli.yaml
    flatten: true
  daemon:
    taskfile: ./taskfiles/daemon.yaml
    flatten: true

tasks:
  clean:
    cmds:
      - "rm -rf bin"
      - "rm -f unit-test-report.md"
      - "mkdir -p bin"
      - "go clean -cache -testcache"
  
  vendor:
    cmds:
      - "go mod vendor"

  chart-checksums:
    desc: "Recompute SHA256 / OCI digests for every chart and version listed under cluster: in infrastructure-catalog.yaml. Requires 'helm' on PATH."
    cmds:
      - "go run ./scripts/chart-checksums"
  
  lint:
    cmds:
      - "go fmt -x ./..."
      - task: lint:errorx

  lint:check:
    cmds:
      - "R=$(go fmt ./...) && if [[ -n \"$R\" ]]; then echo \"The following files require formatting:\"; echo \"$R\"; exit 1; fi"
      - task: lint:errorx

  lint:errorx:
    internal: true
    desc: "Enforce errorx over errors.New / fmt.Errorf in production code (only lines new vs origin/main)"
    deps:
      - task: setup:golangci-lint
      # `mocks` produces *_generated.go test mocks, required by forbidigo's
      # type-aware analysis (analyze-types: true) to typecheck the tree cleanly.
      - task: mocks
    env:
      # Run as Linux so platform-tagged files (e.g. internal/mount/*_unix.go, pkg/kernel
      # via pault.ag/go/modprobe) typecheck on developer macOS the same way they do in CI.
      GOOS: linux
    cmds:
      - cmd: git fetch --no-tags origin main >/dev/null 2>&1 || true
        silent: true
      - golangci-lint run --config .golangci.yml ./...

  setup:golangci-lint:
    desc: "Install golangci-lint v2.12.2 (used by lint:errorx to enforce errorx)"
    internal: true
    status:
      # Require the pinned version exactly, so developers running `task lint:errorx`
      # use the same binary version as CI.
      - 'golangci-lint --version 2>/dev/null | grep -q "version v2.12.2"'
    cmds:
      - cmd: echo "Installing golangci-lint v2.12.2..."
        silent: true
      - cmd: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
        silent: true
  
  license:check:
    desc: "Check if all source files have SPDX license headers"
    dir: scripts
    cmds:
      - "./license-header.sh check"
  
  license:add:
    desc: "Add SPDX license headers to source files that are missing them"
    dir: scripts
    cmds:
      - "./license-header.sh add"
  
  license:
    desc: "Alias for license:add - Add SPDX license headers to source files"
    cmds:
      - task: license:add
  
  build:
    deps:
      - "vendor"
    cmds:
      - task: "clean"
      - task: "build:cli:all"
      - task: "build:daemon:all"
    sources:
      - "**/*.go"
    generates:
      - "bin/solo-provisioner-linux-*"
      - "bin/solo-provisioner-darwin-*"
      - "bin/solo-provisioner-daemon-linux-*"
      - "bin/solo-provisioner-daemon-darwin-*"

  build:image:
    deps:
      - task: "build"
    cmds:
      - "docker build -t solo-weaver ."
  
  generate:
    # Declared `run: once` so multiple callers in the same invocation (e.g.
    # build:cli:all and build:daemon:all from top-level `task build`) share a
    # single execution.
    run: once
    cmds:
      - "go generate ./..."

  run:
    deps:
      - "run:cli"
  
  install:go:
    deps:
      - "install:go:linux"
  
  install:go:linux:
    internal: true
    status:
      - "command -v go"
      - "command -v dlv"
    platforms:
      - "linux/amd64"
      - "linux/arm64"
    cmds:
      - "curl -sSLO https://go.dev/dl/go{{.GO_VERSION}}.{{OS}}-{{ARCH}}.tar.gz"
      - "sudo mkdir -p /usr/local/go"
      - "sudo tar -C /usr/local -xzf go{{.GO_VERSION}}.{{OS}}-{{ARCH}}.tar.gz"
      - "rm -f go{{.GO_VERSION}}.{{OS}}-{{ARCH}}.tar.gz"
      - "echo 'PATH=\"${PATH}:/usr/local/go/bin:$HOME/go/bin\"' | sudo tee /etc/profile.d/go.sh >/dev/null 2>&1"
      - "source /etc/profile.d/go.sh"
      - "source /etc/profile.d/go.sh && go install github.com/go-delve/delve/cmd/dlv@latest"
      # Set the Go toolchain to auto-upgrade to the latest version due to https://github.com/golang/go/issues/75031
      - "/usr/local/go/bin/go env -w GOTOOLCHAIN=go1.26.0+auto"
      - "sudo /usr/local/go/bin/go env -w GOTOOLCHAIN=go1.26.0+auto"
    generates:
      - "/usr/local/go/**"
  
  mocks:
    cmds:
      - go install github.com/golang/mock/mockgen@v1.6.0
      # Generate mocks in the package it belongs. Note these generated mock files are not checked in.
      - mockgen -source=pkg/security/principal/interface.go -self_package github.com/hashgraph/solo-weaver/pkg/security/principal -package principal > pkg/security/principal/mocks_generated.go
      - mockgen -source=pkg/fsx/interface.go -self_package github.com/hashgraph/solo-weaver/pkg/fsx -package fsx > pkg/fsx/mocks_generated.go
      - mockgen -source=pkg/software/interface.go -self_package github.com/hashgraph/solo-weaver/pkg/software -package software> pkg/software/mocks_generated.go
      - mockgen -source=pkg/kernel/interface.go -self_package github.com/hashgraph/solo-weaver/pkg/kernel -package kernel > pkg/kernel/mocks_generated.go
      - mockgen -source=pkg/helm/interface.go -self_package github.com/hashgraph/solo-weaver/pkg/helm -package helm > pkg/helm/mocks_generated.go
  
  # Remote debug tasks for Docker container debugging
  debug:container:
    desc: "Setup debug environment and show available debug commands"
    deps:
      - "debug:container:setup"
    cmds:
      - |
        echo "🐛 Debug environment ready!"
        echo ""
        echo "Available debug commands:"
        echo "  task debug:container:test -- [package]   # Debug tests (package required)"
        echo "  task debug:container:app -- [args...]    # Debug weaver application"
        echo "  task debug:container:stop                # Stop debug container"
        echo ""
  
  debug:container:setup:
    desc: "Setup Docker container for remote debugging"
    dir: build
    cmds:
      - "./debug-setup.sh"
  
  debug:container:test:
    desc: "Start remote test debug server in Docker container (specify package with -- ./pkg/name)"
    deps:
      - "debug:container:setup"
    dir: build
    cmds:
      - "./debug-run.sh test {{.CLI_ARGS}}"
  
  debug:container:app:
    desc: "Start remote application debug server in Docker container (pass args with -- after command)"
    deps:
      - "debug:container:setup"
    dir: build
    cmds:
      - "./debug-run.sh app {{.CLI_ARGS}}"
  
  debug:container:stop:
    desc: "Stop remote debug container"
    cmds:
      - "docker stop solo-weaver-debug 2>/dev/null || true"
  
  # VM Debugging Tasks
