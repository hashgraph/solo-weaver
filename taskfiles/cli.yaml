version: 3

tasks:
  build:cli:all:
    desc: "Build the CLI binary for all configured operating systems and architectures"
    cmds:
      - task: build:cli:all:os

  build:cli:all:os:
    internal: true
    desc: "Build the CLI binary for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: build:cli:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  build:cli:all:arch:
    internal: true
    desc: "Build the CLI binary for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: build:cli
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  build:cli:
    desc: "Build the CLI binary for the specified operating system and architecture (dev mode)"
    env:
      GOOS: "{{coalesce .GOOS OS}}"
      GOARCH: "{{coalesce .GOARCH ARCH}}"
    cmds:
      - cmd: go build -ldflags='{{.LDFLAGS}}' -trimpath -o bin/solo-provisioner-{{coalesce .GOOS OS}}-{{coalesce .GOARCH ARCH}} ./cmd/cli
      - cmd: chmod +x bin/solo-provisioner-{{coalesce .GOOS OS}}-{{coalesce .GOARCH ARCH}}

  hash:cli:all:
    desc: "Hash the CLI binaries for all configured operating systems and architectures"
    deps:
      - "build:cli:all"
    cmds:
      - task: hash:cli:all:os

  hash:cli:all:os:
    internal: true
    desc: "Hash the CLI binaries for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: hash:cli:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  hash:cli:all:arch:
    internal: true
    desc: "Hash the CLI binaries for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: hash:cli
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  hash:cli:
    internal: true
    desc: "Hash the CLI binary for the specified operating system and architecture"
    dir: bin
    cmds:
      - cmd: sha256sum solo-provisioner-{{.GOOS}}-{{.GOARCH}} > solo-provisioner-{{.GOOS}}-{{.GOARCH}}.sha256

  sign:cli:all:
    desc: "Sign the CLI binaries for all configured operating systems and architectures"
    deps:
      - "build:cli:all"
    cmds:
      - task: sign:cli:all:os

  sign:cli:all:os:
    internal: true
    desc: "Sign the CLI binaries for all configured operating systems"
    cmds:
      - for:
          var: OS
        task: sign:cli:all:arch
        vars:
          GOOS: "{{.ITEM}}"

  sign:cli:all:arch:
    internal: true
    desc: "Sign the CLI binaries for all configured architectures"
    cmds:
      - for:
          var: ARCH
        task: sign:cli
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.ITEM}}"

  sign:cli:
    internal: true
    desc: "Sign the CLI binary for the specified operating system and architecture"
    env:
      GOOS: "{{coalesce .GOOS OS}}"
      GOARCH: "{{coalesce .GOARCH ARCH}}"
    cmds:
      - task: hash:cli
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"
      - cmd: gpg --batch --yes --armor --output bin/solo-provisioner-{{.GOOS}}-{{.GOARCH}}.sha256.asc --detach-sign bin/solo-provisioner-{{.GOOS}}-{{.GOARCH}}.sha256
      - cmd: gpg --batch --yes --armor --output bin/solo-provisioner-{{.GOOS}}-{{.GOARCH}}.asc --detach-sign bin/solo-provisioner-{{.GOOS}}-{{.GOARCH}}

  run:cli:
    desc: "Build the CLI for the host OS/ARCH and run it. Args after -- are passed through via .CLI_ARGS."
    deps:
      - "generate"
      - task: "build:cli"
        vars:
          GOOS: "{{OS}}"
          GOARCH: "{{ARCH}}"
    cmds:
      - "bin/solo-provisioner-{{OS}}-{{ARCH}}{{exeExt}} {{.CLI_ARGS}}"

  run:cli:skipdl:
    desc: "Same as run:cli with _LOG_LEVEL=Debug (skip-download dev loop)."
    deps:
      - "generate"
      - task: "build:cli"
        vars:
          GOOS: "{{OS}}"
          GOARCH: "{{ARCH}}"
    env:
      _LOG_LEVEL: "Debug"
    cmds:
      - "bin/solo-provisioner-{{OS}}-{{ARCH}}{{exeExt}} {{.CLI_ARGS}}"
